name: Source formatting

on:
  push:
    branches:
      - main
      - 'apl-fy[0-9][0-9]'
  pull_request: {} # any target
  schedule:
    - cron: '20 8 * * 4'

jobs:
  license-marking:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false
      - name: Set up OS
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install licenseheaders
      - name: Check formatting
        run: |
          ./apply_license.sh
          if ! git diff --quiet; then
            echo "Error: Files changed after formatting:"
            git diff
            exit 1
          fi
