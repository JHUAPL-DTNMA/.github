name: Spellcheck documentation
on:
  push:
    branches:
      - main
      - 'apl-fy[0-9][0-9]'
  pull_request: {} # any target
  schedule:
    - cron: '20 8 * * 4'

jobs:
  spellcheck:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false
      - name: Set up OS
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              aspell
      - name: Validate
        run: ./spellcheck.sh $(find . -iname '*.md')
